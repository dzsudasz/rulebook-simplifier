name: SB4 Gradle CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle' # Automatically caches Gradle dependencies and wrapper

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and Test with Gradle
        run: ./gradlew clean build